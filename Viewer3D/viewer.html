<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DIO 3D Map</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: Segoe UI, sans-serif; }
    #canvasHost { width: 100%; height: 100%; position: relative; }
    #viewCenterReticle {
      position: absolute; left: 50%; top: 50%;
      width: 36px; height: 36px; margin: -18px 0 0 -18px;
      pointer-events: none; z-index: 4;
      opacity: 0.32;
    }
    #viewCenterReticle svg {
      width: 100%; height: 100%;
      stroke: #ffaa00;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #hud { position: absolute; left: 8px; top: 8px; color: #ccc; font-size: 12px; pointer-events: none; text-shadow: 0 1px 2px #000; z-index: 2; }
    #perf { position: absolute; right: 8px; bottom: 8px; color: #888; font-size: 11px; pointer-events: none; z-index: 2; }
    #hint { position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%); color: #aaa; font-size: 11px; pointer-events: none; z-index: 2; white-space: nowrap; }
    #diag {
      position: absolute; left: 8px; bottom: 28px; max-width: 92%;
      color: #ffcc66; font-size: 12px; line-height: 1.45;
      pointer-events: none; z-index: 3; white-space: pre-wrap;
      text-shadow: 0 1px 2px #000;
      min-height: 1.4em;
    }
    #viewToolbar {
      position: absolute; right: 8px; top: 8px; z-index: 5;
      display: flex; flex-wrap: wrap; gap: 4px; max-width: 280px;
      justify-content: flex-end;
    }
    #viewToolbar button {
      background: rgba(30, 30, 30, 0.92);
      border: 1px solid #555;
      color: #ddd;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      min-width: 38px;
    }
    #viewToolbar button:hover { background: #3a3a3a; border-color: #B8D8FC; color: #fff; }
    #viewToolbar button.active { background: #2a4a6a; border-color: #B8D8FC; color: #B8D8FC; }
    #loadOverlay {
      position: fixed; inset: 0; z-index: 9999; background: #1a1a1a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #loadText { color: #B8D8FC; font-size: 18px; font-weight: bold; text-align: center; padding: 0 16px; }
    #loadPct { color: #aaaaaa; font-size: 14px; margin-top: 10px; }
    #loadBarWrap { width: 240px; height: 8px; background: #333; border-radius: 4px; margin-top: 14px; overflow: hidden; }
    #loadBar { height: 100%; width: 0%; background: #B8D8FC; transition: width 0.2s; }
    #errorBanner {
      display: none; position: fixed; left: 0; right: 0; top: 0; z-index: 10000;
      background: rgba(120, 20, 20, 0.95); color: #ffdddd;
      font-size: 15px; font-weight: bold; line-height: 1.45;
      padding: 12px 16px; text-align: center;
      border-bottom: 2px solid #ff6666;
      white-space: pre-wrap;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="errorBanner"></div>
  <div id="loadOverlay">
    <div id="loadText">3D 뷰어 준비 중...</div>
    <div id="loadPct">0%</div>
    <div id="loadBarWrap"><div id="loadBar"></div></div>
  </div>
  <div id="canvasHost">
    <div id="viewCenterReticle" title="회전 중심">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="2.2" stroke-width="1" opacity="0.7"/>
        <path d="M12 4.5 A7.5 7.5 0 0 1 18.2 16" stroke-width="1.3"/>
        <path d="M16.5 14.5 L18.5 16.8 L19.8 14" stroke-width="1.2"/>
        <path d="M12 19.5 A7.5 7.5 0 0 1 5.8 8" stroke-width="1.3" opacity="0.55"/>
        <path d="M7.5 9.5 L5.5 7.2 L4.2 9.8" stroke-width="1.2" opacity="0.55"/>
      </svg>
    </div>
  </div>
  <div id="hud">3D MAP</div>
  <div id="viewToolbar">
    <button type="button" data-view="front" title="정면뷰">정면</button>
    <button type="button" data-rotate="ccw90" title="90° 반시계방향 회전">↺</button>
    <button type="button" data-rotate="cw90" title="90° 시계방향 회전">↻</button>
    <button type="button" data-rotate="flip" title="상하 반전">⇅</button>
  </div>
  <div id="diag"></div>
  <div id="hint">중클릭:회전 · 우클릭:이동 · 터치 2초길게누른뒤 드래그:회전 · 2손가락:이동</div>
  <div id="perf"></div>
  <script>
    window.__resolvedModelsQueue = null;
    window.setResolvedModels = function (d) {
      window.__resolvedModelsQueue = d;
    };
    function postEarly(msg, err) {
      if (window.chrome && window.chrome.webview && window.chrome.webview.postMessage) {
        window.chrome.webview.postMessage({ type: 'loadStatus', message: msg, error: !!err });
      }
      var t = document.getElementById('loadText');
      if (t) t.textContent = msg;
    }
    window.addEventListener('error', function (e) {
      postEarly('JS 오류: ' + (e.message || 'unknown'), true);
    });
    window.addEventListener('unhandledrejection', function (e) {
      postEarly('JS 오류: ' + (e.reason && e.reason.message ? e.reason.message : e.reason), true);
    });
  </script>
  <script type="module">
    const bust = new URLSearchParams(location.search).get('v') || '';
    await import(bust ? `./viewer.js?v=${bust}` : './viewer.js');
  </script>
</body>
</html>
